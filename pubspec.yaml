name: english_ai_study_app
description: A new Flutter project.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.0
  lucide_icons: ^0.257.0
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  audioplayers: ^6.0.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.19.7
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.7.7
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo_English_AI_study.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/data/
